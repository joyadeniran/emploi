services:
  # FastAPI backend for the Next.js dashboard (app.emploihq.com)
  - type: web
    name: emploi-api
    runtime: python
    plan: starter          # disks require a paid plan; this service is already deployed on one
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: EMPLOI_API_KEY
        sync: false          # shared secret; must match the web tier's env
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false          # optional AI fallback provider; unset = Gemini only
      - key: EMPLOI_DB_PATH
        value: /var/data/emploi.sqlite3
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false          # unset = /billing/* returns 503, same posture as GEMINI_API_KEY
      - key: PAYSTACK_PRO_PLAN_CODE
        sync: false          # Paystack dashboard > Products > Plans; ₦3,500/mo
      - key: PAYSTACK_MAX_PLAN_CODE
        sync: false          # Paystack dashboard > Products > Plans; ₦7,500/mo
      - key: WEB_APP_URL
        value: https://app.emploihq.com
      - key: PYTHON_VERSION
        value: 3.12.0
    disk:
      name: emploi-data
      mountPath: /var/data
      sizeGB: 1

  # ---------------------------------------------------------------------------
  # Scheduled workers — Render Cron Jobs cannot mount a persistent disk (a
  # hard product limitation: https://render.com/docs/disks — "Cron jobs
  # can't provision or access a persistent disk"). Since every worker needs
  # the same SQLite file the API uses, these cron services don't run the
  # worker scripts directly. Instead each one is a plain curl call that
  # triggers a /admin/run/* endpoint on the always-on emploi-api service
  # above, which already has the disk mounted (see api/main.py).
  #
  # Heavy workers (ingest, match, verify-employers) run in a background
  # thread there and the trigger returns 202 immediately — Render's HTTP
  # proxy kills responses after ~100s, so a synchronous trigger reported
  # false failures for long runs that actually finished. For those, cron
  # "success" means "trigger accepted"; the run's real outcome is the
  # worker's event row (events table) and the emploi-api service log.
  # Notify and backup finish in seconds and stay synchronous, so their
  # cron status still reflects the true outcome. `curl -sf` exits non-zero
  # on any 4xx/5xx either way.
  # ---------------------------------------------------------------------------

  # High-priority boards, hourly.
  - type: cron
    name: emploi-ingest
    runtime: python
    plan: starter
    schedule: "0 * * * *"
    buildCommand: "true"
    startCommand: >-
      curl -sf --max-time 60 -X POST
      -H "X-API-Key: $EMPLOI_API_KEY"
      "$EMPLOI_API_URL/admin/run/ingest?min_priority=8"
    envVars:
      - key: EMPLOI_API_URL
        value: https://emploi-api.onrender.com
      - key: EMPLOI_API_KEY
        sync: false          # must match emploi-api's EMPLOI_API_KEY

  # All boards, daily.
  - type: cron
    name: emploi-ingest-daily
    runtime: python
    plan: starter
    schedule: "0 1 * * *"
    buildCommand: "true"
    startCommand: >-
      curl -sf --max-time 60 -X POST
      -H "X-API-Key: $EMPLOI_API_KEY"
      "$EMPLOI_API_URL/admin/run/ingest"
    envVars:
      - key: EMPLOI_API_URL
        value: https://emploi-api.onrender.com
      - key: EMPLOI_API_KEY
        sync: false

  # Worker 2 — refresh stale employer trust records.
  - type: cron
    name: emploi-verify-employers
    runtime: python
    plan: starter
    schedule: "30 1 * * *"
    buildCommand: "true"
    startCommand: >-
      curl -sf --max-time 60 -X POST
      -H "X-API-Key: $EMPLOI_API_KEY"
      "$EMPLOI_API_URL/admin/run/verify-employers"
    envVars:
      - key: EMPLOI_API_URL
        value: https://emploi-api.onrender.com
      - key: EMPLOI_API_KEY
        sync: false

  # Worker 3 — match fresh jobs against every completed Career Twin.
  - type: cron
    name: emploi-match
    runtime: python
    plan: starter
    schedule: "0 2 * * *"
    buildCommand: "true"
    startCommand: >-
      curl -sf --max-time 60 -X POST
      -H "X-API-Key: $EMPLOI_API_KEY"
      "$EMPLOI_API_URL/admin/run/match"
    envVars:
      - key: EMPLOI_API_URL
        value: https://emploi-api.onrender.com
      - key: EMPLOI_API_KEY
        sync: false

  # Worker 4 — one digest email per user with unnotified matches. Needs a
  # verified Brevo sender on emploi-api; missing config = safe no-op there,
  # never a false "sent" here.
  - type: cron
    name: emploi-notify
    runtime: python
    plan: starter
    schedule: "30 2 * * *"
    buildCommand: "true"
    startCommand: >-
      curl -sf --max-time 300 -X POST
      -H "X-API-Key: $EMPLOI_API_KEY"
      "$EMPLOI_API_URL/admin/run/notify"
    envVars:
      - key: EMPLOI_API_URL
        value: https://emploi-api.onrender.com
      - key: EMPLOI_API_KEY
        sync: false

  # Worker 5 — nightly SQLite backup to Cloudflare R2 (after ingest/verify/match).
  - type: cron
    name: emploi-backup
    runtime: python
    plan: starter
    schedule: "0 3 * * *"
    buildCommand: "true"
    startCommand: >-
      curl -sf --max-time 300 -X POST
      -H "X-API-Key: $EMPLOI_API_KEY"
      "$EMPLOI_API_URL/admin/run/backup"
    envVars:
      - key: EMPLOI_API_URL
        value: https://emploi-api.onrender.com
      - key: EMPLOI_API_KEY
        sync: false

  # Legacy Streamlit chat app / future internal admin console
  - type: web
    name: emploi
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: EMPLOI_ADMIN_CODE
        sync: false          # REQUIRED in prod — without it the console is public
      - key: PYTHON_VERSION
        value: 3.12.0
