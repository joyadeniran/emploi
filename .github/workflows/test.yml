name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt
      - name: Core suite (offline, fake Gemini)
        run: python3 test_e2e.py
      - name: Verification suite (offline, injected DNS/HTTP/LLM)
        run: python3 test_verify.py
      - name: Persistence suite (in-memory SQLite)
        run: python3 test_db.py
      - name: Landing-site link audit (offline)
        run: python3 test_landing.py
      - name: API suite (offline, fake model/DNS/HTTP)
        run: python3 test_api.py
      - name: Ingestion and matching workers (offline)
        run: python3 test_ingest.py
      - name: Verification refresh worker (offline)
        run: python3 test_verify_worker.py
      - name: Notification worker (offline)
        run: python3 test_notify_worker.py
      - name: Backup worker (offline)
        run: python3 test_backup_db.py

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          AUTH_SECRET: ci-stub-32-chars-exactly-padding
          EMPLOI_API_URL: http://localhost:8000
          EMPLOI_API_KEY: ci-stub
          NEXTAUTH_URL: http://localhost:3000
