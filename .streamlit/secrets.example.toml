# Copy to .streamlit/secrets.toml (gitignored) and fill in.
# Without an [auth] section the app runs in anonymous, session-only mode.

# GEMINI_API_KEY = "your-gemini-key"   # or set as an env var instead

[auth]
# Your app's public URL + /oauth2callback (use localhost for local dev)
redirect_uri = "http://localhost:8501/oauth2callback"
# Any long random string — e.g. `python3 -c "import secrets; print(secrets.token_hex(32))"`
cookie_secret = ""
# From Google Cloud Console -> APIs & Services -> Credentials -> OAuth client ID (Web application)
client_id = ""
client_secret = ""
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"
